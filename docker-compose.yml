version: '3.9'

services:

  # -------------------------------------------------------
  # APPLICATION ANGULAR
  # -------------------------------------------------------
  grey-sloan-rh:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grey-sloan-rh
    ports:
      - "4200:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - grey-sloan-net

networks:
  grey-sloan-net:
    driver: bridge
